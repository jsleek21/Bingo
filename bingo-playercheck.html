<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player Check</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --orange: #f5820a; --green: #00ff44; --red: #ff4444; --bg: #0e0a07; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:var(--bg); font-family:'Barlow',sans-serif; color:#fff; overflow-x:hidden; }

  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(160,50,10,0.2) 0%, transparent 70%);
  }

  #app { position:relative; z-index:1; max-width:820px; margin:0 auto; padding:24px 20px; }

  h1 {
    font-family:'Barlow Condensed',sans-serif;
    font-size:36px; font-weight:900; text-transform:uppercase;
    letter-spacing:3px; color:#fff; margin-bottom:4px;
  }
  h1 span { color:var(--orange); }

  .subtitle { font-size:12px; color:rgba(255,255,255,0.3); letter-spacing:3px; text-transform:uppercase; margin-bottom:24px; }

  #search-bar {
    display:flex; gap:10px; margin-bottom:28px;
  }
  #search-input {
    flex:1; padding:12px 16px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
    border-radius:6px; color:#fff; font-family:'Barlow',sans-serif; font-size:16px;
    outline:none; transition:border 0.2s;
  }
  #search-input:focus { border-color:var(--orange); }
  #search-input::placeholder { color:rgba(255,255,255,0.25); }
  #search-btn {
    padding:12px 28px;
    background:var(--orange); border:none; border-radius:6px;
    color:#fff; font-family:'Barlow Condensed',sans-serif;
    font-size:16px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    cursor:pointer; transition:background 0.2s;
  }
  #search-btn:hover { background:#e07309; }

  #results { display:none; }

  .player-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; border-radius:8px; margin-bottom:16px;
  }
  .player-header.bailz { background:rgba(0,255,68,0.08); border:1px solid rgba(0,255,68,0.25); }
  .player-header.epic  { background:rgba(255,68,68,0.08); border:1px solid rgba(255,68,68,0.25); }
  .player-name { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; letter-spacing:2px; text-transform:uppercase; }
  .player-header.bailz .player-name { color:var(--green); }
  .player-header.epic  .player-name { color:var(--red); }
  .player-team { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.4); }
  .drop-count {
    font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:900;
    text-align:right;
  }
  .player-header.bailz .drop-count { color:var(--green); }
  .player-header.epic  .drop-count { color:var(--red); }
  .drop-count-label { font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:2px; text-transform:uppercase; }

  .drops-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:10px;
    margin-bottom:20px;
  }
  .drop-card {
    padding:12px 14px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
    border-radius:6px; display:flex; align-items:center; gap:10px;
  }
  .drop-icon { font-size:18px; flex-shrink:0; }
  .drop-name { font-size:13px; font-weight:600; color:rgba(255,255,255,0.85); line-height:1.3; }

  .section-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase; color:rgba(255,255,255,0.3);
    margin-bottom:10px; margin-top:4px;
  }

  .grind-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:10px;
    margin-bottom:20px;
  }
  .grind-card {
    padding:12px 14px;
    background:rgba(245,130,10,0.06); border:1px solid rgba(245,130,10,0.18);
    border-radius:6px; display:flex; align-items:center; gap:10px;
  }
  .grind-icon { font-size:18px; flex-shrink:0; color:var(--orange); }
  .grind-name { font-size:13px; font-weight:600; color:rgba(255,200,150,0.85); line-height:1.3; }

  .no-results {
    text-align:center; padding:40px 20px;
    color:rgba(255,255,255,0.3); font-size:14px; letter-spacing:1px;
  }
  .no-results .big { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:700; display:block; margin-bottom:8px; color:rgba(255,255,255,0.15); }

  #status { font-size:11px; color:rgba(255,255,255,0.2); letter-spacing:1px; text-align:center; margin-top:16px; }
  #error  { color:#ff6666; font-size:12px; text-align:center; margin-top:8px; display:none; }

  .url-hint {
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
    border-radius:6px; padding:12px 16px; margin-bottom:20px;
    font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:1px;
  }
  .url-hint strong { color:var(--orange); }
</style>
</head>
<body>
<div id="app">
  <h1>Player <span>Drop</span> Lookup</h1>
  <p class="subtitle">Grind 2 Win Bingo 2026</p>

  <div class="url-hint">
    Tip: Link directly to a player via URL — e.g. <strong>?player=Prodigal+Kid</strong>
  </div>

  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Enter RSN (e.g. Prodigal Kid)" autocomplete="off">
    <button id="search-btn">LOOK UP</button>
  </div>

  <div id="results"></div>
  <div id="status">Auto-refreshes every 30 seconds</div>
  <div id="error"></div>
</div>

<script>
const SHEET_ID  = '2PACX-1vRFaO_V0hqmNV9aNU0YKkCya1XC35NkXrenfb-X0roYmh5eo6aGU9IEWpzF_btiqnkuUAjX0mMIHY6G';
const SUBS_GID  = '1745615016';
const REFRESH   = 30000;

let allSubmissions = []; // {team, item, rsn}
let currentPlayer  = '';

function csvURL(gid) {
  return `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${gid}&output=csv&t=${Date.now()}`;
}

function parseCSV(text) {
  return text.trim().split('\n').map(line => {
    const cols=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    cols.push(cur.trim()); return cols;
  });
}

async function loadSubmissions() {
  try {
    const r = await fetch(csvURL(SUBS_GID), {redirect:'follow',mode:'cors',credentials:'omit'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const rows = parseCSV(await r.text());
    // cols: Team | Item | RSN | Message Link | ...
    allSubmissions = rows
      .filter(row => row[0] && row[1] && row[2] && row[0] !== 'Column 1')
      .map(row => ({
        team: row[0].trim(),
        item: row[1].trim(),
        rsn:  row[2].trim(),
      }));
    document.getElementById('status').textContent = 'Updated: ' + new Date().toLocaleTimeString() + ' · ' + allSubmissions.length + ' total submissions';
    document.getElementById('error').style.display = 'none';
    if (currentPlayer) showResults(currentPlayer);
  } catch(e) {
    document.getElementById('error').textContent = '⚠ Could not load data: ' + e.message;
    document.getElementById('error').style.display = 'block';
  }
}

const GRIND_ITEMS = new Set([
  'Draconic Energies',
  'Blackstone Hearts',
  'Vorkath Spikes',
  'Ancient Scales'
]);

function showResults(playerName) {
  currentPlayer = playerName;
  const name = playerName.trim().toLowerCase();
  const drops = allSubmissions.filter(s => s.rsn.toLowerCase() === name);
  const resultsEl = document.getElementById('results');
  resultsEl.style.display = 'block';

  if (drops.length === 0) {
    resultsEl.innerHTML = `
      <div class="no-results">
        <span class="big">No drops found</span>
        No submissions found for <strong>${playerName}</strong> — check the RSN spelling.
      </div>`;
    return;
  }

  const team      = drops[0].team;
  const isBailz   = team.toLowerCase().includes('bailz');
  const teamClass = isBailz ? 'bailz' : 'epic';

  // Split into regular and grind
  const regularCounts = {}, grindCounts = {};
  drops.forEach(d => {
    const matched = [...GRIND_ITEMS].find(g => g.toLowerCase() === d.item.toLowerCase());
    if (matched) grindCounts[matched]  = (grindCounts[matched]  || 0) + 1;
    else         regularCounts[d.item] = (regularCounts[d.item] || 0) + 1;
  });

  const regularTotal = Object.values(regularCounts).reduce((a,b) => a+b, 0);

  // Regular drop cards
  const regularCards = Object.entries(regularCounts).sort().map(([item, count]) =>
    `<div class="drop-card">
      <span class="drop-icon">&#9670;</span>
      <span class="drop-name">${count > 1 ? `<strong>${count}x</strong> ` : ''}${item}</span>
    </div>`
  ).join('');

  // Grind cards — only if they have any
  const grindSection = Object.keys(grindCounts).length > 0 ? `
    <div class="section-label">&#9654; Grind Drops</div>
    <div class="grind-grid">
      ${Object.entries(grindCounts).sort().map(([item, count]) =>
        `<div class="grind-card">
          <span class="grind-icon">&#9670;</span>
          <span class="grind-name"><strong>${count}x</strong> ${item}</span>
        </div>`
      ).join('')}
    </div>` : '';

  resultsEl.innerHTML = `
    <div class="player-header ${teamClass}">
      <div>
        <div class="player-name">${drops[0].rsn}</div>
        <div class="player-team">${team}</div>
      </div>
      <div style="text-align:right">
        <div class="drop-count">${regularTotal}</div>
        <div class="drop-count-label">Drop${regularTotal !== 1 ? 's' : ''} Submitted</div>
      </div>
    </div>
    ${regularCards ? `<div class="section-label">&#9654; Drops</div><div class="drops-grid">${regularCards}</div>` : ''}
    ${grindSection}`;
}

function lookup() {
  const val = document.getElementById('search-input').value.trim();
  if (!val) return;
  // Update URL so it can be linked directly
  const url = new URL(window.location);
  url.searchParams.set('player', val);
  window.history.replaceState({}, '', url);
  showResults(val);
}

document.getElementById('search-btn').addEventListener('click', lookup);
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookup();
});

// Check for ?player= URL param on load
const urlPlayer = new URLSearchParams(window.location.search).get('player');
if (urlPlayer) {
  document.getElementById('search-input').value = urlPlayer;
}

// Load data and set refresh
loadSubmissions();
setInterval(loadSubmissions, REFRESH);
if (urlPlayer) {
  // Wait for data then show
  setTimeout(() => showResults(urlPlayer), 1500);
}
</script>
</body>
</html>
